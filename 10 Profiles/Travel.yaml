overrides: {}
checklist:
  - Battery
  - Spare card
  - Shutter speed safe for focal length and subject
  - ISO and stabilization checked
  - Exposure compensation checked
watch_for:
  - Changing light
common_mistakes:
  - Leaving exposure compensation set
notes:
  - Use neutral 1-Point AF for general travel subjects; switch to People detection and Face + Tracking for portraits and family photographs.
  - Raise ISO when needed to protect shutter speed as light or subject movement changes.
