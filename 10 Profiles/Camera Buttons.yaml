title: Camera Buttons
subtitle: Owner-Confirmed Layout
display_category: reference
display_order: 10
card_type: reference
card:
  icons:
    left: camera_default
reference_settings:
  - control: Shutter button half-press
    assignment: Metering start
  - control: AF-ON button
    assignment: Metering and AF start
  - control: AE Lock button
    assignment: Metering and AF start (1-Point AF override)
  - control: AF Point Selection button
    assignment: AF point selection; Main Dial changes selection
  - control: Lens AF button
    assignment: AF Off
  - control: SET button
    assignment: Set AF point to center
  - control: DOF button
    assignment: One-Shot AF ↔ Servo AF
  - control: Joystick
    assignment: Direct AF point selection
  - control: Main Dial
    assignment: Shutter Speed
  - control: Rear Wheel
    assignment: Aperture
  - control: Top Rear Dial
    assignment: ISO Speed
  - control: Control Ring
    assignment: Exposure Compensation
  - control: M-Fn button
    assignment: Unresolved — review later
checklist:
  - Practice back-button AF before a critical shoot.
  - Use the linked deep dive for the AF-ON and AE Lock INFO details.
  - Test AF-ON and AE Lock separately; do not hold both AF buttons together.
  - Confirm Manual + Auto ISO before using exposure compensation.
  - Recheck assignments after a reset or firmware update.
watch_for:
  - AE Lock is no longer available for its default exposure-lock function
  - Exposure Compensation on Control Ring requires Auto ISO in Manual exposure
  - M-Fn remains unresolved pending a separate review
common_mistakes:
  - Expecting shutter half-press to autofocus after enabling back-button AF
  - Pressing AF-ON and AE Lock together instead of choosing one AF behavior
  - Expecting Eye Detection to operate with the 1-Point AF override
  - Changing a confirmed control while experimenting with the unresolved M-Fn assignment
