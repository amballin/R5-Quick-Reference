metadata:
  version: 1.0
  status: Draft
  last_updated: 2026-07-17
  release: true

title: Fireworks
subtitle: 
inherits: baseline

card:
  icons:
    left: fireworks
  colors:
    background:
    text:

overrides:
  exposure:
    mode: Manual
    iso:
      mode: Fixed
      value: 100

  shutter:
    target: 2–6 s (start at 4 s)

  lens:
    aperture:
      target: f/8–f/11

  autofocus:
    operation: Manual Focus
    method: Not Used

  drive:
    mode: Single Shot

  stabilization:
    image_stabilization:
      mode: "Off"
    ibis: "Off"
    lens_is: "Off"

checklist:
  - Tripod secure
  - Manual focus locked
  - Remote release or 2-second timer
  - RGB Histogram checked
  - Highlight Alert enabled
  - Long Exposure NR off during show
  - Leave room for highest bursts
  - Watch smoke direction

watch_for:
  - Blown highlights
  - Smoke obscuring display
  - Cropped bursts
  - Camera vibration

common_mistakes:
  - ISO too high
  - Aperture too wide
  - Autofocus hunting
  - IS left on while on tripod

notes:
  - Prefocus on a distant object before the show.
  - Start at 4 s, f/8–f/11, ISO 100; adjust shutter time for the number and length of trails.
  - Use a smaller aperture only for unusually bright displays.
  - Increase shutter time to capture multiple bursts or use Bulb mode for complete control.
  - Keep Long Exposure NR off during an active show because its dark-frame cycle can cause missed bursts.
