metadata:
  version: 1.0
  status: Draft
  last_updated: 2026-07-16
  release: true

title: Birds in Flight
card:
  icons:
    left: bird_in_flight
inherits: baseline
overrides:
  exposure:
    mode: Tv
    exposure_compensation: "Adjust for background"

  autofocus:
    subject_detection: Animals

  drive:
    mode: High Speed Continuous+

  shutter:
    target: "1/2000–1/4000"
  stabilization:
    image_stabilization:
      mode: Mode 3

checklist:
  - Servo AF
  - Bird/eye acquired
  - Shutter speed verified
  - Histogram checked
  - Focus limiter set for distance

watch_for:
  - Motion blur
  - Tracking the wrong bird
  - Bright-sky underexposure
  - Buffer filling

common_mistakes:
  - Shutter too slow
  - Failing to adjust exposure for the background
  - Staying with subject detection when it repeatedly selects the wrong target
  - Poor panning

notes:
  - Use Expand AF Area with Subject Detection None when the bird is small or obscured, the background is busy, or subject detection repeatedly selects the wrong target.
  - Use Image Stabilization Mode 3 for erratic flight and action.
  - Switch to Mode 2 only for deliberate steady panning.
