metadata:
  version: 1.0
  status: Draft
  last_updated: 2026-07-17
  release: true
title: Wildlife
card:
  icons:
    left: wildlife
inherits: baseline
overrides:
  autofocus:
    subject_detection: Animals
    eye_detection: Enable
  drive:
    mode: High Speed Continuous
checklist:
  - Eye detected
  - Histogram
  - Background checked
watch_for:
  - Busy background
  - Subject movement
common_mistakes:
  - Focus on body instead of eye
notes:
  - Use Expand AF if Face + Tracking struggles through branches.
  - Use Tv for active wildlife when shutter speed must dominate; Fv may be better for mixed safari or walkaround wildlife.
  - Switch to Mode 3 for active wildlife
