metadata:
  version: 1.0
  status: Draft
  last_updated: 2026-07-16
  release: false
title: Macro
inherits: baseline

card:
  icons:
    left: macro
  colors:
    background:
    text:

overrides:
  exposure:
    mode: Av

  image:
    focus_bracketing: Enable

  lens:
    aperture:
      target: f/8

  autofocus:
    operation: One Shot AF
    subject_detection: None
    eye_detection: Disable
    method: Spot AF
checklist:
  - Stable support
  - Focus bracketing enabled
  - Start focus on nearest important detail
  - Focus confirmed
watch_for:
  - Extremely shallow depth of field
common_mistakes:
  - Camera movement
notes:
  - Use manual focus when appropriate.
  - Focus bracketing is the starting point for macro; begin around f/8, increment 1-3, and 80-200 shots, then adjust for magnification and subject depth.
  - '<a href="../appendices/Focus%20Bracketing%20%26%20In-Camera%20Depth%20Compositing.html">Focus Bracketing &amp; In-Camera Depth Compositing appendix</a>'
