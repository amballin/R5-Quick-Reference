metadata:
  version: 1.0
  status: Draft
  last_updated: 2026-07-17
  release: false
title: Waterdrops
card:
  icons:
    left: water_drops
inherits: baseline
overrides:
  exposure:
    mode: Manual
    iso:
      mode: Fixed
      value: 100
  autofocus:
    operation: Manual Focus
    method: Not Used
  shutter:
    target: 1/200
  lens:
    aperture:
      target: f/8–f/11
  stabilization:
    image_stabilization:
      mode: "Off"
    ibis: "Off"
    lens_is: "Off"
checklist:
  - Pluto armed
  - Flash ready
  - Manual flash about 1/16–1/64 power
  - Trigger and flash sync verified
watch_for:
  - Ambient light
  - Flash recycle consistency
  - Depth of field
common_mistakes:
  - Incorrect trigger timing
notes:
  - Use manual flash; its short duration freezes the drop, while 1/200 controls ambient light and stays within the trigger/flash synchronization setup.
  - Lower flash power usually gives a shorter flash duration; start around 1/16–1/64 and adjust exposure, recycle performance, and motion freezing.
