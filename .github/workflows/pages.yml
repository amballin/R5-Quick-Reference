name: Validate Pages Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check docs site
        run: |
          test -f docs/index.html
          test -f docs/manifest.webmanifest
          test -f docs/service-worker.js
          test -f docs/.nojekyll
          test -d docs/Cards
          test -d docs/appendices
          test -d docs/assets
          test -d docs/icons
