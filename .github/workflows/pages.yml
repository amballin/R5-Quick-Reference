name: Validate Pages Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check docs site
        run: |
          test -f docs/index.html
          test -f docs/manifest.webmanifest
          test -f docs/service-worker.js
          test -f docs/.nojekyll
          test -d docs/Cards
          test -n "$(find docs/Cards -maxdepth 1 -name '*.html' -print -quit)"
          test -d docs/web-assets
          test -d docs/appendices
          test -d docs/app-assets
          ! find docs -name '* [0-9]*' -print -quit | grep -q .
          ! find docs -name '.DS_Store' -print -quit | grep -q .
