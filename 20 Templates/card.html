<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Camera Settings">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="{{BACKGROUND_COLOR}}">
<title>{{TITLE}} - Camera Settings</title>
<style>
html{box-sizing:border-box;-webkit-text-size-adjust:100%;background:{{BACKGROUND_COLOR}}}
*,*::before,*::after{box-sizing:inherit}
body{margin:0;min-width:0;background:{{BACKGROUND_COLOR}};color:{{TEXT_COLOR}};font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(14px,3.75vw,16px);line-height:1.3;overflow-x:hidden}
.site-nav{max-width:430px;margin:0 auto;--site-nav-bg:{{BACKGROUND_COLOR}};--site-nav-text:{{TEXT_COLOR}}}
.card{width:min(100%,430px);min-height:calc(100svh - 68px);margin:0 auto;padding:12px max(16px,env(safe-area-inset-right,0px)) calc(env(safe-area-inset-bottom,0px) + 20px) max(16px,env(safe-area-inset-left,0px));background:{{BACKGROUND_COLOR}}}
.header{min-height:44px;display:grid;grid-template-columns:44px minmax(0,1fr) 44px;align-items:center;margin-bottom:4px}
.header-spacer{min-width:0}
.header-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.header-icon.left{justify-self:start}
.header-icon.right{justify-self:end}
.header-icon img{display:block;max-width:38px;max-height:38px;width:auto;height:auto;object-fit:contain}
h1{text-align:center;font-size:clamp(26px,7.5vw,32px);line-height:1.08;margin:0;overflow-wrap:anywhere}
.sub{text-align:center;color:#b7d2e8;margin:4px 0 12px}
h2{color:#8dc8ff;border-bottom:1px solid #53738c;padding-bottom:3px;margin:12px 0 5px;font-size:clamp(19px,5vw,21px);line-height:1.1}
table{width:100%;border-collapse:collapse;table-layout:fixed}
td{padding:3px 0;vertical-align:top;overflow-wrap:anywhere}
td:first-child{width:48%;padding-right:10px;color:#b7d2e8}
td:last-child{text-align:right;font-weight:600}
.setting-label{display:inline-flex;align-items:center;gap:7px;max-width:100%}
.setting-icon{display:block;width:22px;height:22px;object-fit:contain;flex:0 0 22px;filter:brightness(0) saturate(100%) invert(76%) sepia(32%) saturate(784%) hue-rotate(178deg) brightness(103%) contrast(101%)}
ul{margin:4px 0 0;padding-left:22px}
li{margin:2px 0;overflow-wrap:anywhere}
a{color:#b7dfff;text-underline-offset:2px}
{{SITE_NAV_CSS}}
@media (min-width:431px){body{padding:24px}.card{min-height:0;border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.22)}}
@media (max-width:340px){.card{padding-left:max(12px,env(safe-area-inset-left,0px));padding-right:max(12px,env(safe-area-inset-right,0px))}td:first-child{width:50%}.setting-icon{width:20px;height:20px;flex-basis:20px}}
</style>
</head>
<body>
{{NAVIGATION_HEADER}}
<article class="card">
<div class="header">
<div class="header-icon left">{{HEADER_ICON_LEFT}}</div>
<h1>{{TITLE}}</h1>
<div class="header-icon right">{{HEADER_ICON_RIGHT}}</div>
</div>
{{SUBTITLE_BLOCK}}
{{SETTINGS_SECTION}}
<h2>Checklist</h2>
{{CHECKLIST}}
<h2>Watch For</h2>
{{WATCH}}
<h2>Common Mistakes</h2>
{{MISTAKES}}
<h2>Notes</h2>
{{NOTES}}
</article>
</body>
</html>
