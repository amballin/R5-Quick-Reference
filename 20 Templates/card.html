<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>
body{margin:0;width:393px;height:852px;background:{{BACKGROUND_COLOR}};color:{{TEXT_COLOR}};font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.22}
.header{height:60px;display:grid;grid-template-columns:1fr 160px 1fr;align-items:start;padding:18px 22px 0}
.island{width:160px;height:34px;background:{{BACKGROUND_COLOR}};border-radius:20px}
.header-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.header-icon.left{justify-self:start}
.header-icon.right{justify-self:end}
.header-icon img{max-width:38px;max-height:38px;object-fit:contain}
.wrap{padding:0 22px}
h1{text-align:center;font-size:30px;margin:0 0 8px}
.sub{text-align:center;color:#b7d2e8;margin:4px 0 10px}
h2{color:#8dc8ff;border-bottom:1px solid #53738c;padding-bottom:2px;margin:10px 0 4px;font-size:20px;line-height:1.1}
table{width:100%;border-collapse:collapse}
td{padding:2px 0}
td:first-child{color:#b7d2e8}
td:last-child{text-align:right;font-weight:600}
ul{margin:3px 0 0 12px;padding-left:10px}
li{margin:1px 0}
</style>
</head>
<body>
<div class="header">
<div class="header-icon left">{{HEADER_ICON_LEFT}}</div>
<div class="island"></div>
<div class="header-icon right">{{HEADER_ICON_RIGHT}}</div>
</div>
<div class="wrap">
<h1>{{TITLE}}</h1>
{{SUBTITLE_BLOCK}}
<h2>Settings</h2>
{{SETTINGS}}
<h2>Checklist</h2>
{{CHECKLIST}}
<h2>Watch For</h2>
{{WATCH}}
<h2>Common Mistakes</h2>
{{MISTAKES}}
<h2>Notes</h2>
{{NOTES}}
</div>
</body>
</html>
