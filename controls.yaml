  - Owner-confirmed assignments are the authoritative record of the current chosen setup.
  - Recommendations must be labeled as recommendations and must not be presented as current settings.
  - Unresolved items remain unresolved until the owner decides them.
  - IMG_6335 through IMG_6340 are retired historical evidence and are not reliable evidence of the current setup.

