reading_rules:
  - Read displayed Canon text exactly; do not decode icon-only assignments.
  - UNKNOWN means the value is not confidently readable or is not shown.
  - The left column under the still-camera icon is still-photo custom controls; the right column under the movie-camera icon is movie custom controls.

